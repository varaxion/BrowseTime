<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseTime</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>BrowseTime</h1>
    </header>

    <div class="active-indicator" id="activeIndicator" style="display: none;">
      <span class="label">Currently active</span>
      <div class="domain">
        <span id="activeDomain">...</span>
        <span class="time" id="activeTime">0s</span>
      </div>
    </div>

    <div class="stats-container" id="statsContainer">
      <!-- Domain list items go here -->
    </div>

    <footer>
      <div class="total-time">
        <span>Total active:</span>
        <span id="totalTime">0m</span>
      </div>
      <button id="resetBtn">Reset Session</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
