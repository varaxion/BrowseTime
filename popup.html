<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowseTime</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <h1>BrowseTime</h1>
        <div class="session-start" id="sessionStart">INIT: ...</div>
      </div>
      <div class="sort-controls">
        <select id="sortSelect" class="cyber-select">
          <option value="timeDesc">TIME (DESC)</option>
          <option value="timeAsc">TIME (ASC)</option>
          <option value="alpha">A-Z</option>
        </select>
      </div>
    </header>

    <div class="active-indicator" id="activeIndicator">
      <span class="label">[ LIVE MONITORING ]</span>
      <div class="domain">
        <span id="activeDomain" class="neon-text">...</span>
        <span class="time" id="activeTime">0s</span>
      </div>
    </div>

    <div class="stats-container" id="statsContainer">
      <!-- Domain list items go here -->
    </div>

    <footer>
      <div class="total-time">
        <span>[TOTAL_ACTIVE]</span>
        <span id="totalTime" class="neon-text">0s</span>
      </div>
      <button id="resetBtn" class="cyber-btn">KILL_SESSION</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
